name: Weekly BFC-VOLUME review

# The batched weekly edit (the core L1 + L3 rhythm, done together). Routine creative/geo edits
# happen here, not daily - trickling daily changes resets Meta's learning phase.
# Cron is UTC. '0 8 * * 1' = Monday 13:30 IST - same time of day as the daily
# rule-pass (daily-rule-pass.yml), just weekly instead of daily. Moved from
# 11:30 IST 2026-07-15 alongside the daily pass.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run weekly review (full batched roster) and post to Slack
        run: python rule_pass.py --mode weekly
        env:
          WIOM_DASHBOARD_TOKEN: ${{ secrets.WIOM_DASHBOARD_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # SLACK_CHANNEL_ID defaults to #growth-reports (C0B9G0Q68G6); SLACK_DM_USER_ID to U05A9037VFG. Override here only if they change.
