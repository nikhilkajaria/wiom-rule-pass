name: Daily Budget Utilization Pass

# 00:15 IST (18:45 UTC, previous calendar day) - deliberately close to midnight,
# not the same slot as the other passes (11:45 IST). Spend and budget are both
# pulled directly from Meta/Google (no growth-dashboard dependency). Running
# this close to the spend day's close minimizes the window in which a human
# budget edit between day-close and the check could make spend (from before
# the edit) and budget (read live) mismatch - confirmed happening for real on
# 2026-07-12 when a same-morning edit was compared against the prior day's
# spend at an 11:45 IST run.
# Flags Meta ad sets / Google campaigns where yesterday's spend deviated
# >10% from daily budget, with a first-pass diagnostic (top ads for Meta,
# network split for Google UAC). Read-only, DM only. Never writes to any ad
# platform.
on:
  schedule:
    - cron: '45 18 * * *'
  workflow_dispatch: {}

jobs:
  budget-util:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-ads google-auth requests python-dotenv

      - name: Run budget utilization pass
        run: python budget_util_pass.py
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # SLACK_DM_USER_ID defaults to U05A9037VFG (Nikhil)
