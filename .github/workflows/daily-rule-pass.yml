name: Daily BFC-VOLUME rule-pass

# Runs after the morning ETL and DMs the flagged kills to Slack.
# GitHub Actions cron is UTC and can be delayed a few minutes under load.
# 06:00 UTC = 11:30 IST. Ensure the ETL completes before 11:30 IST.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}        # lets you trigger a manual run from the Actions tab

jobs:
  rule-pass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure git for the internal log commit (rule_pass.py's git_commit_log())
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run daily kill + prune pass and post to Slack (#growth-reports + DM)
        run: python rule_pass.py --mode daily
        env:
          WIOM_DASHBOARD_TOKEN: ${{ secrets.WIOM_DASHBOARD_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # SLACK_CHANNEL_ID defaults to #growth-reports (C0B9G0Q68G6); SLACK_DM_USER_ID to U05A9037VFG. Override here only if they change.
