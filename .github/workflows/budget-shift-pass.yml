name: Daily Budget Shift Pass

# Runs 30 min after the kill pass (06:30 UTC = 12:00 IST).
# Checks 7-day rolling Meta vs Google CPBL, triggers a shift recommendation
# if the gap > 10% for 3 consecutive days. Read-only: posts to Slack,
# human approves and executes. Never writes to any ad platform.
on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch: {}

jobs:
  budget-shift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-ads google-auth requests python-dotenv

      - name: Run budget shift pass
        run: python budget_shift_pass.py
        env:
          WIOM_DASHBOARD_TOKEN: ${{ secrets.WIOM_DASHBOARD_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # SLACK_CHANNEL_ID defaults to #growth-reports (C0B9G0Q68G6)
          # SLACK_DM_USER_ID defaults to U05A9037VFG (Nikhil)

      - name: Commit updated state + log
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add budget_shift_state.json budget_shift_log.csv
          git diff --cached --quiet || git commit -m "budget-shift-pass: update state + log $(date -u +%Y-%m-%d)"
          git push
